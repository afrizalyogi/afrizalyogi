name: Generate Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate stats SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/generate_stats.py

      - name: Commit and push to main
        run: |
          git config --global user.name "stats-bot"
          git config --global user.email "stats-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update stats: $(date +%Y-%m-%d)"
          git push
