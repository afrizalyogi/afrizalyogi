name: Update Now Section

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  now:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Now section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_now.py

      - name: Commit if changed
        run: |
          git config --global user.name "now-bot"
          git config --global user.email "now-bot@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update Now section: $(date +%Y-%m-%d)"
          git push
